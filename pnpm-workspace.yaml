packages:
  # hypercode — core control plane & apps
  - 'hypercode/packages/ts/*'
  - 'hypercode/apps/*'
  - '!hypercode/apps/hypercode-extension'
  - '!hypercode/apps/vscode'

  # hypermcp — MCP decision system & registry
  - 'hypermcp/packages/ts/*'

  # hypermem — memory substrate
  - 'hypermem/packages/ts/*'

  # hyperingest — ingestion & harvesting
  - 'hyperingest/packages/ts/*'

  # hyperharness — LLM harness & provider layer
  - 'hyperharness/packages/ts/*'

  # shared — cross-domain infra
  - 'shared/packages/ts/*'

  # research submodules that have their own packages
  - 'hypercode/research/maestro/packages/*'
  - 'hypercode/research/maestro/apps/*'
  - 'hypercode/research/cloud-orchestrator/apps/*'
  - 'hypercode/research/cloud-orchestrator/packages/*'
  - 'hypercode/research/cloud-orchestrator/server'
  - 'hypermcp/research/prism-mcp/packages/*'
  - 'hyperingest/research/litellm/*'

  # exclusions
  - '!archive/**'
